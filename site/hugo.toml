baseURL = "https://hardknocks.university/"
title = "Spyglass Connect"
enableRobotsTXT = true
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[params]
  appName = "Spyglass Connect"
  tagline = "Your Minecraft Companion"
  description = "Browse blocks, items, recipes, mobs, biomes, enchantments, potions, structures, and trades — plus calculators for building and enchanting. All offline."
  ogImage = "images/og-image.png"
  colorPrimary = "#C9A84C"
  colorSecondary = "#7c4dff"
  colorBackground = "#0E0C0A"
  colorConnect = "#AB47BC"
  downloadURL = "https://github.com/beryndil/Spyglass/releases/latest"
  repoURL = "https://github.com/beryndil/Spyglass"
  connectRepoURL = "https://github.com/beryndil/Spyglass-Connect"
  dataRepoURL = "https://github.com/beryndil/Spyglass-Data"
  blocks = 1167
  items = 502
  recipes = 1291
  mobs = 81
  trades = 231
  biomes = 65
  structures = 25
  enchantments = 43
  potions = 130
  commands = 85
  advancements = 125
  calculators = 19
  themes = 15

# ── Languages ────────────────────────────────────────
[languages]
  [languages.en]
    languageCode = "en-us"
    languageName = "English"
    weight = 1
  [languages.es]
    languageCode = "es"
    languageName = "Español"
    weight = 2
    [languages.es.params]
      tagline = "Tu Compañero de Minecraft"
      description = "Explora bloques, objetos, recetas, criaturas, biomas, encantamientos, pociones, estructuras y comercios — con calculadoras para construir y encantar. Todo sin conexión."
  [languages.pt]
    languageCode = "pt"
    languageName = "Português"
    weight = 3
    [languages.pt.params]
      tagline = "Seu Companheiro de Minecraft"
      description = "Explore blocos, itens, receitas, criaturas, biomas, encantamentos, poções, estruturas e trocas — com calculadoras para construir e encantar. Tudo offline."
  [languages.fr]
    languageCode = "fr"
    languageName = "Français"
    weight = 4
    [languages.fr.params]
      tagline = "Votre Compagnon Minecraft"
      description = "Parcourez les blocs, objets, recettes, créatures, biomes, enchantements, potions, structures et échanges — avec des calculateurs pour construire et enchanter. Tout hors ligne."
  [languages.de]
    languageCode = "de"
    languageName = "Deutsch"
    weight = 5
    [languages.de.params]
      tagline = "Dein Minecraft-Begleiter"
      description = "Durchsuche Blöcke, Gegenstände, Rezepte, Kreaturen, Biome, Verzauberungen, Tränke, Strukturen und Handel — mit Rechnern zum Bauen und Verzaubern. Alles offline."
  [languages.ja]
    languageCode = "ja"
    languageName = "日本語"
    weight = 6
    [languages.ja.params]
      tagline = "あなたのマインクラフトコンパニオン"
      description = "ブロック、アイテム、レシピ、モブ、バイオーム、エンチャント、ポーション、構造物、取引を閲覧 — 建築やエンチャント用の計算機付き。すべてオフライン対応。"

